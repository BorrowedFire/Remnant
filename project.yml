name: Remnant

options:
  bundleIdPrefix: com.borrowedfire.remnant
  deploymentTarget:
    iOS: 26.0
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: 6.0
    IPHONEOS_DEPLOYMENT_TARGET: 26.0

fileGroups:
  - Remnant.storekit

schemes:
  Remnant:
    build:
      targets:
        Remnant: all
    run:
      config: Debug
      storeKitConfiguration: Remnant.storekit
    test:
      config: Debug
      targets:
        - RemnantTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Remnant:
    type: application
    platform: iOS
    sources:
      - path: Remnant
        excludes:
          - "**/*.md"
          - "**/Info.plist"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.borrowedfire.remnant
        INFOPLIST_FILE: Remnant/Info.plist
        PRODUCT_NAME: Remnant
        TARGETED_DEVICE_FAMILY: "1,2"
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1
        ENABLE_PREVIEWS: YES
        DEVELOPMENT_ASSET_PATHS: ""
        CODE_SIGN_ENTITLEMENTS: Remnant/Remnant.entitlements
      configs:
        Debug:
          SWIFT_ACTIVE_COMPILATION_CONDITIONS: DEBUG
        Release:
          SWIFT_OPTIMIZATION_LEVEL: -O

  RemnantTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - RemnantTests
    dependencies:
      - target: Remnant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.borrowedfire.remnant.tests
        TARGETED_DEVICE_FAMILY: "1,2"
        GENERATE_INFOPLIST_FILE: YES
