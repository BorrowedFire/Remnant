name: Remnant

options:
  bundleIdPrefix: com.borrowedfire.remnant
  deploymentTarget:
    macOS: 26.0
  createIntermediateGroups: true
  generateEmptyDirectories: false

settings:
  base:
    SWIFT_VERSION: 6.0
    MACOSX_DEPLOYMENT_TARGET: 26.0

schemes:
  Remnant:
    build:
      targets:
        Remnant: all
    run:
      config: Debug
    test:
      config: Debug
      targets:
        - RemnantTests
    profile:
      config: Release
    analyze:
      config: Debug
    archive:
      config: Release

targets:
  Remnant:
    type: application
    platform: macOS
    sources:
      - path: Remnant/App
      - path: Remnant/ExpenseTracker
      - path: Remnant/Resources
      - path: Remnant/Extensions
      - path: Remnant/Assets.xcassets
      - path: Remnant/PrivacyInfo.xcprivacy
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.borrowedfire.remnant
        INFOPLIST_FILE: Remnant/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        PRODUCT_NAME: Remnant
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: 1

  remnantctl:
    type: tool
    platform: macOS
    sources:
      - path: RemnantCLI
      - path: Remnant/ExpenseTracker/Models
      - path: Remnant/ExpenseTracker/Services
      - path: Remnant/Extensions
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.borrowedfire.remnant.remnantctl
        PRODUCT_NAME: remnantctl

  RemnantTests:
    type: bundle.unit-test
    platform: macOS
    sources:
      - path: RemnantTests
    dependencies:
      - target: Remnant
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.borrowedfire.remnant.tests
        GENERATE_INFOPLIST_FILE: YES
