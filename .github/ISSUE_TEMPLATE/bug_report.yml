name: Bug report
description: Report a Remnant bug with sanitized reproduction data.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not attach real receipts, bank statements, account numbers, tax documents, or private business records. Use synthetic data.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Reproduction steps
      description: Use synthetic sample rows/files.
      placeholder: |
        1. Import this sanitized CSV...
        2. Attach this fake receipt...
        3. Observe...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
  - type: input
    id: macos
    attributes:
      label: macOS version
      placeholder: "macOS 26.x"
  - type: checkboxes
    id: redaction
    attributes:
      label: Privacy check
      options:
        - label: I have removed or replaced all private financial data.
          required: true
